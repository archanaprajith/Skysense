<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkySense</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="map-bg"></div>
    <div class="title">SkySense <span role="img" aria-label="Cloud icon">☁️</span></div>
    
    <div id="app-container" class="card">
        <div class="search-container">
            <input type="text" id="city-input" class="search-input" placeholder="Enter city name...">
            <button id="search-button" class="search-button">
                <span role="img" aria-label="Search">🔍</span>
            </button>
        </div>
        <div id="content-area">
            <!-- Weather information will be rendered dynamically -->
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
